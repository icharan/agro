<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBF Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-decoration: none;
            color: black;
            transition: transform 0.2s;
        }

        .card img {
            width: 70px;
            height: 70px;
            margin-bottom: 10px;
        }

        .card:hover {
            transform: scale(1.05);
        }

        @media (max-width: 500px) {
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <h1>IBF Dashboard</h1>

    <div class="container">

        <a href="IbfHeatwave.html" class="card">
            <img src="hwave.png" alt="Heatwave Icon">
            <h3>IBF Heatwave</h3>
        </a>

        <a href="FOUR3.html" class="card" target="_blank" rel="noopener noreferrer">
            <img src="6.gif" alt="NAVTEX">
            <h3>Gmail Redirect</h3>
        </a>

        <a href="DISTRICTS.html" class="card" target="_blank" rel="noopener noreferrer">
            <img src="10.gif" alt="Districts Selector">
            <h3>Districts Selector</h3>
        </a>

        <a href="IbfRainfall.html" class="card">
            <img src="hrf.png" alt="Rainfall Icon">
            <h3>IBF Heavy Rainfall</h3>
        </a>

    </div>

</body>
</html>
